{% extends "base.html" %}
{% block content %}
<h1>Configuración general</h1>
<section class="panel">
  <form method="post" enctype="multipart/form-data" class="form-grid">
    <label>Día recordatorio
      <input name="reminder_day" value="{{ reminder.setting_value if reminder else '25' }}">
    </label>
    <label>Logo corporativo
      <input type="file" name="logo_file" accept="image/*">
    </label>
    <button type="submit">Guardar configuración</button>
  </form>
  {% if logo and logo.setting_value %}
  <div class="logo-preview">
    <img src="{{ brand_logo_url }}" alt="Logo actual" style="max-height:100px;">
  </div>
  {% endif %}
</section>
{% endblock %}
