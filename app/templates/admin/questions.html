{% extends "base.html" %}
{% block content %}
<h1>Preguntas</h1>
<section class="panel">
  <form method="post" class="form-grid">
    <label>Clave<input name="question_key" required></label>
    <label>Área<select name="area_code">{% for area in areas %}<option value="{{ area.code }}">{{ area.name }}</option>{% endfor %}</select></label>
    <label>Formulario<input name="form_code" required></label>
    <label>Sección<input name="section" required></label>
    <label>Grupo<input name="group_key" required></label>
    <label>Código<input name="question_code" required></label>
    <label>Etiqueta<input name="label" required></label>
    <label>Tipo
      <select name="input_type">
        <option value="number">number</option>
        <option value="text">text</option>
        <option value="long_text">long_text</option>
        <option value="date">date</option>
        <option value="select">select</option>
        <option value="multiselect">multiselect</option>
      </select>
    </label>
    <label>Unidad<input name="unit"></label>
    <label>Orden<input name="order_n" value="0"></label>
    <label>Opciones directas<input name="options"></label>
    <label>Lista asociada<input name="list_code"></label>
    <label>Hoja origen<input name="source_sheet"></label>
    <label>Notas<input name="notes"></label>
    <label class="inline"><input type="checkbox" name="required" checked> Requerida</label>
    <label class="inline"><input type="checkbox" name="allow_observation"> Observación</label>
    <label class="inline"><input type="checkbox" name="user_can_manage_options"> Usuario puede gestionar lista</label>
    <label class="inline"><input type="checkbox" name="is_active" checked> Activa</label>
    <button type="submit">Crear</button>
  </form>
</section>
<table class="data-table">
  <thead><tr><th>Clave</th><th>Área</th><th>Sección</th><th>Etiqueta</th><th>Tipo</th><th>Lista</th><th></th></tr></thead>
  <tbody>
    {% for item in items %}
    <tr>
      <td>{{ item.question_key }}</td><td>{{ item.area_code }}</td><td>{{ item.section }}</td><td>{{ item.label }}</td><td>{{ item.input_type }}</td><td>{{ item.list_code }}</td>
      <td><form method="post" action="{{ url_for('admin.delete_question', item_id=item.id) }}" onsubmit="return confirm('¿Eliminar?')"><button type="submit">Eliminar</button></form></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
