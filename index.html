<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PARACEL · Sistema de Reportes Mensuales</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="login-page">

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="login-screen">
    <div class="login-bg">
      <div class="login-bg-shape s1"></div>
      <div class="login-bg-shape s2"></div>
      <div class="login-bg-shape s3"></div>
    </div>
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-mark">P</div>
        <div class="login-brand">
          <span class="brand-name">PARACEL</span>
          <span class="brand-sub">Sistema de Reportes Mensuales</span>
        </div>
      </div>
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" id="loginUser" autocomplete="username" placeholder="usuario" required />
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="loginPass" autocomplete="current-password" placeholder="••••••••" required />
        </div>
        <div id="loginError" class="login-error hidden">Usuario o contraseña incorrectos</div>
        <button type="submit" class="btn-login">Ingresar</button>
      </form>
      <p class="login-footer">© 2026 PARACEL S.A. · Uso interno</p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="appShell" class="app-shell hidden">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="logo-mark sm">P</div>
          <span>PARACEL</span>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Menú">
          <span></span><span></span><span></span>
        </button>
      </div>

      <div class="sidebar-period">
        <div class="period-label">Período activo</div>
        <div class="period-value" id="sidebarPeriod">—</div>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <!-- rendered by JS based on user role -->
      </nav>

      <div class="sidebar-user" id="sidebarUser">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-info">
          <div class="user-name" id="userName">—</div>
          <div class="user-role" id="userRole">—</div>
        </div>
        <button class="btn-logout" id="btnLogout" title="Cerrar sesión">↩</button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="mainContent">
      <!-- views rendered by JS -->
    </main>

  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/graph.js"></script>
  <script src="js/forms.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/reminders.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
